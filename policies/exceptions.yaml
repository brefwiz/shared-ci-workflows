  - id: RUSTSEC-2023-0071
    owner: team-security
    review_by: 2026-08-17
    reason: "rsa Marvin Attack timing side-channel; transitive via sqlx's mysql feature family (checked 2026-07-17: sqlx already at latest 0.9.0, postgres-only consumers unaffected in practice — no patched rsa release exists upstream, this is a long-standing unresolved rsa-crate advisory, not a stale sqlx pin); only postgres feature used at runtime, MySQL + RSA code never linked"
    risk: known
    impact: low
    tracking: brefwiz/shared-ci-workflows#62
    resolution: remove once rsa ships a fix, or sqlx drops the transitive rsa dep for postgres-only builds

  - id: RUSTSEC-2026-0173
    owner: team-security
    review_by: 2026-09-20
    reason: "proc-macro-error2 unmaintained; transitive via validator_derive (validator 0.20, latest release) pulled by api-bones and others; not a vulnerability, no upstream fix until validator migrates off it"
    risk: known
    impact: low
    tracking: brefwiz/socle#90
    resolution: remove once validator migrates off proc-macro-error2
