exceptions:
  - id: RUSTSEC-2026-0098
    owner: team-security
    review_by: 2026-08-17
    reason: "rustls-webpki 0.101.7 via rustls 0.21 → aws-smithy-http-client 1.2.0 (checked 2026-07-17: legacy hyper-0.14/rustls-0.21 stack still resolves unconditionally in the latest release; sealwiz already applies the available consumer-side mitigation); TLS cert name-constraint edge cases not triggered by AWS service endpoint calls"
    risk: known
    impact: low
    tracking: brefwiz/shared-ci-workflows#61
    resolution: remove once aws-smithy-http-client drops or feature-gates the legacy rustls-0.21 stack

