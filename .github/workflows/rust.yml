name: Rust CI (reusable)

# Called by downstream repos:
#
#   jobs:
#     ci:
#       uses: brefwiz/shared-ci-workflows/.github/workflows/rust.yml@main
#       with:
#         run-coverage: true

on:
  workflow_call:
    inputs:
      run-coverage:
        description: Collect LLVM coverage and upload to Codecov
        type: boolean
        default: false
      run-no-std:
        description: Run no_std + no_std+alloc checks (requires crate to have an `alloc` feature)
        type: boolean
        default: false
      run-security:
        description: Run the security audit + deny job
        type: boolean
        default: true
      use-central-policies:
        description: Use policies/ from this repo for cargo-audit and cargo-deny
        type: boolean
        default: true
      run-no-default-features:
        description: Run clippy and tests with --no-default-features (disable for crates that require at least one feature)
        type: boolean
        default: true
      extra-test-flags:
        description: Extra flags appended to `cargo nextest run`
        type: string
        default: ""
      container-image:
        description: CI container image to use
        type: string
        default: ghcr.io/brefwiz/ci:latest

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    container: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    container: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout shared-ci-workflows
        uses: actions/checkout@v4
        with:
          repository: brefwiz/shared-ci-workflows
          path: .shared-ci
      - name: Makefile contract check
        shell: bash
        run: bash .shared-ci/scripts/check-makefile-contract.sh --strict-pre-commit
      - name: Release changelog check
        shell: bash
        run: bash .shared-ci/scripts/check-release-changelog.sh
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Clippy (no default features)
        if: inputs.run-no-default-features
        run: cargo clippy --workspace --no-default-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    container: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@v4
      - name: Test (all features)
        run: cargo nextest run --workspace --all-features ${{ inputs.extra-test-flags }}
      - name: Test (no default features)
        if: inputs.run-no-default-features
        run: cargo nextest run --workspace --no-default-features ${{ inputs.extra-test-flags }}

  no-std:
    name: no_std
    runs-on: ubuntu-latest
    container: ${{ inputs.container-image }}
    if: inputs.run-no-std
    steps:
      - uses: actions/checkout@v4
      - name: Check (no_std, core only)
        run: cargo check --workspace --no-default-features
      - name: Check (no_std + alloc)
        run: cargo check --workspace --no-default-features --features alloc

  security:
    name: Security (audit + deny)
    runs-on: ubuntu-latest
    if: inputs.run-security
    container: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch central policies
        if: inputs.use-central-policies
        uses: actions/checkout@v4
        with:
          repository: brefwiz/shared-ci-workflows
          path: .shared-ci-workflows
          sparse-checkout: |
            policies
            scripts

      - name: Validate central policy mapping
        if: inputs.use-central-policies
        run: cargo-vuln-policy-validator
               .shared-ci-workflows/policies/audit.toml
               .shared-ci-workflows/policies/deny.toml
               .shared-ci-workflows/policies/exceptions.yaml

      - name: cargo audit (central)
        if: inputs.use-central-policies
        run: cargo audit --file .shared-ci-workflows/policies/audit.toml

      - name: cargo audit (local)
        if: "!inputs.use-central-policies"
        run: cargo audit

      - name: cargo deny (central)
        if: inputs.use-central-policies
        run: cargo deny check --config .shared-ci-workflows/policies/deny.toml

      - name: cargo deny (local)
        if: "!inputs.use-central-policies"
        run: cargo deny check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    container: ${{ inputs.container-image }}
    if: inputs.run-coverage
    steps:
      - uses: actions/checkout@v4
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
