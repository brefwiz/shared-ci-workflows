name: Build & push CI images

on:
  push:
    branches: [main]
    paths:
      - docker/ci-base.Dockerfile
      - docker/ci.Dockerfile
      - .github/workflows/build-images.yml
  workflow_dispatch:
    inputs:
      push:
        description: Push images (false = dry-run build only)
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  CI_BASE_IMAGE: ghcr.io/brefwiz/ci-base
  CI_IMAGE: ghcr.io/brefwiz/ci

jobs:
  # Per-arch native builds. QEMU emulation of arm64 is unviable here:
  # ci.Dockerfile compiles ~10 cargo tools from source (cargo-llvm-cov,
  # sccache, sqlx-cli, …); emulated arm64 cargo-install of that set
  # exceeds the 6h job timeout (see run 25073269858).
  build-images:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ── ci-base ──────────────────────────────────────────────────────────────

      - name: Build and push ci-base (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci-base.Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: |
            ${{ env.CI_BASE_IMAGE }}:sha-${{ steps.sha.outputs.short }}-${{ matrix.arch }}
            ${{ env.CI_BASE_IMAGE }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=ci-base-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-base-${{ matrix.arch }}

      # ── ci (extends the ci-base just pushed for this arch) ──────────────────

      - name: Build and push ci (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci.Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            CI_BASE_TAG=sha-${{ steps.sha.outputs.short }}-${{ matrix.arch }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: |
            ${{ env.CI_IMAGE }}:sha-${{ steps.sha.outputs.short }}-${{ matrix.arch }}
            ${{ env.CI_IMAGE }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=ci-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.arch }}

  # Stitch per-arch images into a single multi-arch manifest under the
  # canonical tags (latest, sha-<short>).
  manifest:
    name: Multi-arch manifest
    needs: build-images
    if: github.event_name != 'workflow_dispatch' || inputs.push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        run: |
          set -euo pipefail
          short=$(echo ${{ github.sha }} | cut -c1-7)
          for image in "$CI_BASE_IMAGE" "$CI_IMAGE"; do
            docker buildx imagetools create \
              -t "${image}:sha-${short}" \
              "${image}:sha-${short}-amd64" \
              "${image}:sha-${short}-arm64"
            if [ "$IS_DEFAULT_BRANCH" = "true" ]; then
              docker buildx imagetools create \
                -t "${image}:latest" \
                "${image}:latest-amd64" \
                "${image}:latest-arm64"
            fi
          done
