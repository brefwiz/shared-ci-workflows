name: Build & push CI images

on:
  push:
    branches: [main]
    paths:
      - docker/ci-base.Dockerfile
      - docker/ci.Dockerfile
  workflow_dispatch:
    inputs:
      push:
        description: Push images (false = dry-run build only)
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  CI_BASE_IMAGE: ghcr.io/brefwiz/ci-base
  CI_IMAGE: ghcr.io/brefwiz/ci

jobs:
  build-ci-base:
    name: ci-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CI_BASE_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ci-base
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci-base.Dockerfile
          push: ${{ inputs.push != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ci:
    name: ci
    runs-on: ubuntu-latest
    needs: build-ci-base
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CI_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ci
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci.Dockerfile
          build-args: |
            CI_BASE_TAG=${{ needs.build-ci-base.outputs.tag }}
          push: ${{ inputs.push != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
