name: Build & push CI images

on:
  push:
    branches: [main]
    paths:
      - docker/ci-base.Dockerfile
      - docker/ci.Dockerfile
  workflow_dispatch:
    inputs:
      push:
        description: Push images (false = dry-run build only)
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  CI_BASE_IMAGE: ghcr.io/brefwiz/ci-base
  CI_IMAGE: ghcr.io/brefwiz/ci

jobs:
  build-images:
    name: Build & push ci-base and ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── ci-base ──────────────────────────────────────────────────────────────

      - name: Docker meta (ci-base)
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CI_BASE_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push ci-base
        id: build-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci-base.Dockerfile
          push: ${{ inputs.push != false }}
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: type=gha,scope=ci-base
          cache-to: type=gha,mode=max,scope=ci-base

      # ── ci (extends ci-base pushed above) ────────────────────────────────────

      - name: Docker meta (ci)
        id: meta-ci
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CI_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push ci
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci.Dockerfile
          build-args: |
            CI_BASE_TAG=${{ steps.meta-base.outputs.version }}
          push: ${{ inputs.push != false }}
          tags: ${{ steps.meta-ci.outputs.tags }}
          labels: ${{ steps.meta-ci.outputs.labels }}
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
