name: Policy expiry

on:
  push:
    branches: [main]
    paths:
      - policies/**
      - .github/workflows/policy-expiry.yml
  pull_request:
    branches: [main]
    paths:
      - policies/**
      - .github/workflows/policy-expiry.yml
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC

permissions: {}

jobs:
  check:
    name: Check policy review-by dates
    runs-on: ubuntu-latest
    container: ghcr.io/brefwiz/ci:latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate policy mapping
        run: cargo-vuln-policy-validator
             policies/audit.toml
             policies/deny.toml
             policies/exceptions.yaml
