name: Makefile Contract Check (reusable)

# Reusable workflow that verifies the caller repo's Makefile implements the
# unified contract used by these reusable CI workflows.
#
# Required targets: help, fmt, ci-format, ci-lint, ci-test, ci-coverage, pre-commit
#
# Caller example:
#
#   jobs:
#     contract-check:
#       uses: brefwiz/shared-ci-workflows/.github/workflows/contract-check.yml@main

on:
  workflow_call:
    inputs:
      makefile:
        description: Path to the Makefile to check (relative to repo root)
        type: string
        default: "Makefile"
      strict-pre-commit:
        description: If true, also verify pre-commit chains ci-format ci-lint ci-test
        type: boolean
        default: true
      runner:
        description: Runner label
        type: string
        default: ubuntu-latest

jobs:
  contract-check:
    name: Makefile Contract
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Checkout shared-ci-workflows
        uses: actions/checkout@v4
        with:
          repository: brefwiz/shared-ci-workflows
          path: .shared-ci

      - name: Run Makefile contract check
        shell: bash
        run: |
          STRICT_FLAG=""
          if [ "${{ inputs.strict-pre-commit }}" = "true" ]; then
            STRICT_FLAG="--strict-pre-commit"
          fi
          bash .shared-ci/scripts/check-makefile-contract.sh \
            --makefile "${{ inputs.makefile }}" \
            $STRICT_FLAG

      - name: Failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "### ❌ Makefile contract check failed"
            echo ""
            echo "This repo does not implement the unified Makefile contract required by these reusable workflows."
            echo ""
            echo "**Required targets:** \`help\`, \`fmt\`, \`ci-format\`, \`ci-lint\`, \`ci-test\`, \`ci-coverage\`, \`pre-commit\`"
            echo ""
            echo "Targets that are not meaningful for this repo (e.g. \`ci-coverage\` in a docs-only repo) MUST still exist as a no-op that prints an explanation and exits 0."
          } >> "$GITHUB_STEP_SUMMARY"
